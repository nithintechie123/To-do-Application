<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d10" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>TaskFlow</title>

    <!--
      Prevent flash of wrong theme (FOUT).
      This tiny inline script runs before React hydrates and applies
      the saved theme class to <html> immediately.
    -->
    <script>
      (function () {
        var saved  = localStorage.getItem('theme');
        var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme  = saved || system;
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>

  <!--
    Light mode:  bg-gray-50  text-gray-900
    Dark mode:   bg-[#0d0d10] text-white
    Tailwind dark: prefix handles the switch via the "dark" class on <html>
  -->
  <body class="bg-gray-50 dark:bg-[#0d0d10] text-gray-900 dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
